<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mixelith UI Mockup</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080a12;
      --surface: #121626;
      --surface-2: #1a2033;
      --text: #f7f8ff;
      --muted: #a9b0c3;
      --cyan: #34d6ff;
      --violet: #8f5cff;
      --line: rgba(255, 255, 255, 0.09);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .phone {
      width: min(390px, 100%);
      min-height: 760px;
      border: 1px solid var(--line);
      border-radius: 32px;
      overflow: hidden;
      background: linear-gradient(180deg, #0b0e18 0%, #080a12 100%);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.45);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 20px 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 750;
      letter-spacing: 0;
    }

    .mark {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--cyan), var(--violet));
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 3px;
      padding: 7px;
    }

    .mark span {
      border-radius: 3px;
      background: rgba(8, 10, 18, 0.72);
    }

    .ghost {
      width: 36px;
      height: 36px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--surface);
    }

    main {
      padding: 18px 20px 24px;
    }

    .hero {
      min-height: 210px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 18px;
      padding-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: 38px;
      line-height: 1.02;
      letter-spacing: 0;
    }

    p {
      color: var(--muted);
      margin: 0;
      line-height: 1.55;
      font-size: 15px;
    }

    .cta {
      border: 0;
      border-radius: 18px;
      padding: 16px 18px;
      color: #05070d;
      font-weight: 800;
      width: 100%;
      background: linear-gradient(135deg, var(--cyan), var(--violet));
    }

    .stage {
      margin-top: 28px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--surface);
      padding: 14px;
    }

    .preview {
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      background:
        linear-gradient(135deg, rgba(52, 214, 255, 0.24), rgba(143, 92, 255, 0.2)),
        linear-gradient(45deg, #272d42 25%, #111625 25% 50%, #272d42 50% 75%, #111625 75%);
      background-size: auto, 46px 46px;
      display: grid;
      place-items: center;
      color: rgba(247, 248, 255, 0.82);
      font-weight: 700;
    }

    .chips {
      display: flex;
      gap: 10px;
      overflow: hidden;
      padding-top: 14px;
    }

    .chip {
      flex: 0 0 auto;
      border-radius: 999px;
      padding: 10px 13px;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      background: var(--surface-2);
    }

    .chip.active {
      color: var(--text);
      border-color: transparent;
      background: linear-gradient(135deg, rgba(52, 214, 255, 0.42), rgba(143, 92, 255, 0.42));
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .secondary {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 13px 12px;
      background: transparent;
      color: var(--text);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <section class="phone" aria-label="Mixelith mobile UI mockup">
    <header>
      <div class="brand">
        <div class="mark" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
        <span>Mixelith</span>
      </div>
      <div class="ghost" aria-hidden="true"></div>
    </header>
    <main>
      <section class="hero">
        <h1>Local art filters.</h1>
        <p>Transform a photo into a graphic style while keeping everything on device.</p>
        <button class="cta">Import photo</button>
      </section>
      <section class="stage">
        <div class="preview">Preview</div>
        <div class="chips">
          <span class="chip active">Pixel Blocks</span>
          <span class="chip">Posterize</span>
          <span class="chip">Stencil</span>
        </div>
        <div class="actions">
          <button class="secondary">Reset</button>
          <button class="secondary">Export</button>
        </div>
      </section>
    </main>
  </section>
</body>
</html>
